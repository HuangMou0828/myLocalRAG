openapi: 3.0.3
info:
  title: Multi-AI Session Hub Public API
  version: 1.0.0
  description: |
    对外公开版接口文档（OpenClaw 默认工具集 + 受控写入入口）。

    设计原则：
    - 默认保留 OpenClaw 常用读取、检索、复盘、Prompt 能力
    - 暴露 Raw Inbox / OpenClaw inbox 写入同步入口，承接 L4 -> L5 记忆流
    - 隐藏数据源管理、Bug/Feishu、Embedding 运维、模型配置等高风险接口
    - 当前服务未启用鉴权，生产环境请在网关层补充鉴权、scope 和限流
servers:
  - url: http://127.0.0.1:3030
    description: Local development server

tags:
  - name: System
  - name: Sessions
  - name: Retrieval
  - name: Wiki
  - name: Knowledge
  - name: OpenClaw
  - name: Prompt
  - name: Review

paths:
  /api/health:
    get:
      tags: [System]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok, workspace]
                properties:
                  ok:
                    type: boolean
                  workspace:
                    type: string

  /api/sessions:
    get:
      tags: [Sessions]
      summary: Query sessions
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: provider
          required: false
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: conversationId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                required: [updatedAt, issues, sessions]
                properties:
                  updatedAt:
                    type: string
                    nullable: true
                  issues:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  sessions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /api/retrieve:
    post:
      tags: [Retrieval]
      summary: Retrieve memory candidates for a query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                provider:
                  type: string
                topK:
                  type: integer
                  minimum: 1
                  maximum: 30
                includeMessages:
                  type: boolean
                autoEmbed:
                  type: boolean
                rewriteQuery:
                  type: boolean
                  description: Use assistant model to rewrite the retrieval query before recall
                generateAnswer:
                  type: boolean
                  description: Use assistant model to synthesize a grounded answer from retrieved evidence
                timeRange:
                  type: object
                  properties:
                    from:
                      type: string
                      format: date-time
                    to:
                      type: string
                      format: date-time
      responses:
        '200':
          description: Retrieval result
          content:
            application/json:
              schema:
                type: object
                required: [query, topK, totalCandidates, totalMatched, context_block, results]
                properties:
                  query: { type: string }
                  retrievalQuery:
                    type: string
                  topK: { type: integer }
                  totalCandidates: { type: integer }
                  totalMatched: { type: integer }
                  updatedAt:
                    type: string
                    nullable: true
                  context_block:
                    type: string
                  embedding:
                    type: object
                    additionalProperties: true
                  queryRewrite:
                    type: object
                    additionalProperties: true
                  answer:
                    type: object
                    additionalProperties: true
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/wiki-vault/explain:
    get:
      tags: [Wiki]
      summary: Explain vault audience, read order, and usage rules
      responses:
        '200':
          description: Vault usage guide
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/wiki-vault/lint:
    get:
      tags: [Wiki]
      summary: Run lint checks against the generated wiki
      parameters:
        - in: query
          name: writeReport
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Wiki lint report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/wiki-vault/promotion-queue:
    get:
      tags: [Wiki]
      summary: Build or read the pending promotion queue for draft wiki updates
      parameters:
        - in: query
          name: writeReport
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Promotion queue snapshot
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/wiki-vault/search:
    post:
      tags: [Wiki]
      summary: Search wiki-facing markdown notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                topK:
                  type: integer
                  minimum: 1
                  maximum: 20
                spaces:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                includeMarkdown:
                  type: boolean
      responses:
        '200':
          description: Wiki note search result
          content:
            application/json:
              schema:
                type: object
                required: [query, topK, spaces, totalNotes, totalMatched, results]
                properties:
                  query: { type: string }
                  topK: { type: integer }
                  spaces:
                    type: array
                    items:
                      type: string
                  totalNotes: { type: integer }
                  totalMatched: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/wiki-vault/note:
    get:
      tags: [Wiki]
      summary: Read a wiki note by relative path
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wiki note content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/wiki-vault/project:
    get:
      tags: [Wiki]
      summary: Read a project hub by project key or title
      parameters:
        - in: query
          name: project
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project hub content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/openclaw-knowledge/preview:
    post:
      tags: [OpenClaw]
      summary: Preview OpenClaw knowledge inbox sync
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                root:
                  type: string
                  description: Optional OpenClaw inbox root. Defaults to ~/.openclaw/knowledge/inbox.
      responses:
        '200':
          description: OpenClaw sync preview
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/openclaw-knowledge/import:
    post:
      tags: [OpenClaw]
      summary: Import changed OpenClaw knowledge items into Raw Inbox
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                root:
                  type: string
                  description: Optional OpenClaw inbox root. Defaults to ~/.openclaw/knowledge/inbox.
      responses:
        '200':
          description: OpenClaw sync import result and refreshed promotion queue summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/knowledge-items:
    get:
      tags: [Knowledge]
      summary: List Raw Inbox knowledge items
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
        - in: query
          name: sourceType
          required: false
          schema:
            type: string
            default: all
        - in: query
          name: status
          required: false
          schema:
            type: string
            default: visible
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Raw Inbox knowledge items
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Knowledge]
      summary: Upsert a Raw Inbox knowledge item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeItemInput'
      responses:
        '200':
          description: Saved Raw Inbox item
          content:
            application/json:
              schema:
                type: object
                required: [item]
                properties:
                  item:
                    type: object
                    additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/knowledge-items/status:
    post:
      tags: [Knowledge]
      summary: Update Raw Inbox item status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, status]
              properties:
                id:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema:
                type: object
                required: [item]
                properties:
                  item:
                    type: object
                    additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'
        '404':
          $ref: '#/components/responses/Error404'

  /api/knowledge-items/delete:
    post:
      tags: [Knowledge]
      summary: Delete or archive a Raw Inbox knowledge item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/prompt-rubric:
    get:
      tags: [Prompt]
      summary: Get prompt scoring rubric
      responses:
        '200':
          description: Prompt rubric
          content:
            application/json:
              schema:
                type: object
                required: [rubric]
                properties:
                  rubric:
                    type: object
                    additionalProperties: true

  /api/prompt-score:
    post:
      tags: [Prompt]
      summary: Score a single prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                promptId:
                  type: string
                contextMessages:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Prompt score result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/prompt-score-batch:
    post:
      tags: [Prompt]
      summary: Score prompts in batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompts]
              properties:
                prompts:
                  type: array
                  minItems: 1
                  items:
                    oneOf:
                      - type: string
                      - type: object
                        additionalProperties: true
      responses:
        '200':
          description: Batch score result
          content:
            application/json:
              schema:
                type: object
                required: [total, results]
                properties:
                  total:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/prompt-optimize:
    post:
      tags: [Prompt]
      summary: Optimize a prompt (DSPy with fallback)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                promptId:
                  type: string
                taskType:
                  type: string
                model:
                  type: string
                language:
                  type: string
                  enum: [zh-CN, en-US]
                forceRegenerate:
                  type: boolean
                timeoutMs:
                  type: integer
                contextMessages:
                  type: array
                  items:
                    type: string
                constraints:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
      responses:
        '200':
          description: Optimization result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/ask:
    post:
      tags: [Prompt]
      summary: Ask a remote LLM (OpenAI-compatible)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                systemPrompt:
                  type: string
                model:
                  type: string
                timeoutMs:
                  type: integer
                temperature:
                  type: number
                topP:
                  type: number
                maxTokens:
                  type: integer
            example:
              query: 用三句话解释什么是 RAG
              systemPrompt: 你是一个简洁准确的中文助手
      responses:
        '200':
          description: Ask result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'

  /api/review:
    post:
      tags: [Review]
      summary: Generate behavior review and skill candidates
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                recentDays:
                  type: integer
                  minimum: 1
                minRepeatedPrompt:
                  type: integer
                  minimum: 2
      responses:
        '200':
          description: Review report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

components:
  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    KnowledgeItemInput:
      type: object
      properties:
        id:
          type: string
          description: Stable id. OpenClaw should use openclaw_ plus a stable path hash.
        sourceType:
          type: string
          enum: [capture, note, document]
        sourceSubtype:
          type: string
        status:
          type: string
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        sourceUrl:
          type: string
        sourceFile:
          type: string
        tags:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        meta:
          type: object
          additionalProperties: true
