  /api/retrieve:
    post:
      tags: [Retrieval]
      summary: Retrieve memory candidates for a query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                provider:
                  type: string
                topK:
                  type: integer
                  minimum: 1
                  maximum: 30
                includeMessages:
                  type: boolean
                autoEmbed:
                  type: boolean
                rewriteQuery:
                  type: boolean
                  description: Use assistant model to rewrite the retrieval query before recall
                generateAnswer:
                  type: boolean
                  description: Use assistant model to synthesize a grounded answer from retrieved evidence
                timeRange:
                  type: object
                  properties:
                    from:
                      type: string
                      format: date-time
                    to:
                      type: string
                      format: date-time
      responses:
        '200':
          description: Retrieval result
          content:
            application/json:
              schema:
                type: object
                required: [query, topK, totalCandidates, totalMatched, context_block, results]
                properties:
                  query: { type: string }
                  retrievalQuery:
                    type: string
                  topK: { type: integer }
                  totalCandidates: { type: integer }
                  totalMatched: { type: integer }
                  updatedAt:
                    type: string
                    nullable: true
                  context_block:
                    type: string
                  embedding:
                    type: object
                    additionalProperties: true
                  queryRewrite:
                    type: object
                    additionalProperties: true
                  answer:
                    type: object
                    additionalProperties: true
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

  /api/embeddings/rebuild:
    post:
      tags: [Embedding]
      summary: Rebuild session embeddings
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  description: provider name or all
                force:
                  type: boolean
                limit:
                  type: integer
                  minimum: 1
                  maximum: 5000
      responses:
        '200':
          description: Rebuild summary
          content:
            application/json:
              schema:
                type: object
                required:
                  - provider
                  - limit
                  - force
                  - totalSessions
                  - alreadyEmbedded
                  - targetCount
                  - generated
                  - embedding
                  - generatedAt
                properties:
                  provider: { type: string }
                  limit: { type: integer }
                  force: { type: boolean }
                  totalSessions: { type: integer }
                  alreadyEmbedded: { type: integer }
                  targetCount: { type: integer }
                  generated: { type: integer }
                  embedding:
                    type: object
                    properties:
                      source: { type: string }
                      model: { type: string }
                      fallback: { type: boolean }
                      error: { type: string, nullable: true }
                  generatedAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/Error400'

  /api/embeddings/evaluate:
    post:
      tags: [Embedding]
      summary: Evaluate hybrid retrieval quality
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                topK:
                  type: integer
                  minimum: 1
                  maximum: 30
                sampleSize:
                  type: integer
                  minimum: 5
                  maximum: 200
                autoEmbed:
                  type: boolean
      responses:
        '200':
          description: Evaluation metrics
          content:
            application/json:
              schema:
                type: object
                required: [provider, topK, sampleSize, autoEmbed, metrics, embedding, generatedAt]
                properties:
                  provider: { type: string }
                  topK: { type: integer }
                  sampleSize: { type: integer }
                  autoEmbed: { type: boolean }
                  metrics:
                    type: object
                    additionalProperties:
                      type: number
                  embedding:
                    type: object
                    properties:
                      fallbackRate: { type: number }
                  improvedCases:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  regressedCases:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  generatedAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/Error400'

  /api/review:
    post:
      tags: [Review]
      summary: Generate behavior review and skill candidates
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                recentDays:
                  type: integer
                  minimum: 1
                minRepeatedPrompt:
                  type: integer
                  minimum: 2
      responses:
        '200':
          description: Review report
          content:
            application/json:
              schema:
                type: object
                required: [generatedAt, range, summary, behaviorMetrics, providerStats, roleStats, topTerms, repeatedPrompts, skillCandidates]
                properties:
                  generatedAt:
                    type: string
                    format: date-time
                  range:
                    type: object
                    additionalProperties: true
                  summary:
                    type: object
                    additionalProperties: true
                  behaviorMetrics:
                    type: object
                    additionalProperties: true
                  providerStats:
                    type: object
                    additionalProperties:
                      type: integer
                  roleStats:
                    type: object
                    additionalProperties:
                      type: integer
                  topTerms:
                    type: array
                    items:
                      type: object
                      properties:
                        term: { type: string }
                        count: { type: integer }
                  repeatedPrompts:
                    type: array
                    items:
                      type: object
                      properties:
                        prompt: { type: string }
                        count: { type: integer }
                  skillCandidates:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          $ref: '#/components/responses/Error400'

components:
  requestBodies:
    MessageTagsBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [sessionId, messageIds]
            properties:
              sessionId:
                type: string
              messageIds:
                type: array
                minItems: 1
                items:
                  type: string
              tags:
                type: array
                items:
                  type: string

  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MessageTagsResponse:
      description: Tag update result
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Source:
      type: object
      required: [id, name, provider, path, format, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        path:
          type: string
        format:
          type: string
        createdAt:
          type: string
          format: date-time

    PatchDirPreset:
      type: object
      required: [id, alias, path]
      properties:
        id:
          type: string
        alias:
          type: string
        path:
          type: string

    UploadedFile:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        content:
          type: string

    ImportResult:
      type: object
      required: [imported, total, issues, updatedAt]
      properties:
        imported:
          type: integer
        total:
          type: integer
        issues:
          type: array
          items:
            type: object
            additionalProperties: true
        updatedAt:
          type: string
          format: date-time

    IndexSnapshot:
      type: object
      required: [updatedAt, sessions, issues]
      properties:
        updatedAt:
          type: string
          format: date-time
        sessions:
          type: array
          items:
            type: object
            additionalProperties: true
        issues:
          type: array
          items:
            type: object
            additionalProperties: true
